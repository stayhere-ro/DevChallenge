openapi: 3.0.3
info:
  title: DevChallenge Booking API
  version: 1.1.0
  description: |
    Hairdresser booking API for the Code Studio technical challenge.

    **Web-only (not in this spec):** admin dashboard at `/admin/dashboard` — stylist management,
    booking modal wizard, CSV export, search/sort on bookings table.

    **Auth:** public `POST /api/bookings` and `GET /api/availability`; `GET /api/bookings` requires Sanctum bearer token.
servers:
  - url: http://localhost:8000/api
paths:
  /bookings:
    post:
      summary: Create booking
      tags: [Bookings]
      parameters:
        - in: header
          name: Idempotency-Key
          schema:
            type: string
          required: false
          description: Replays the same 201 response within 24h for duplicate retries.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StoreBookingRequest'
            example:
              name: Jane Doe
              email: jane@example.com
              hairdresser_id: 1
              date: '2026-06-30'
              start_time: '11:00'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Booking'
        '409':
          description: Slot already booked for this hairdresser
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingConflictError'
        '422':
          description: Validation error (weekend, outside hours, inactive hairdresser, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '429':
          description: Rate limited (20 requests/min per IP)
          headers:
            Retry-After:
              schema:
                type: integer
                example: 60
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
    get:
      summary: List authenticated user bookings
      description: Returns paginated bookings where `email` matches the authenticated Sanctum user.
      tags: [Bookings]
      security:
        - sanctum: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
          required: false
      responses:
        '200':
          description: Paginated booking list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Booking'
                  links:
                    $ref: '#/components/schemas/PaginationLinks'
                  meta:
                    $ref: '#/components/schemas/PaginationMeta'
        '401':
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageError'
  /availability:
    get:
      summary: Weekly availability
      tags: [Availability]
      parameters:
        - in: query
          name: hairdresser_id
          required: true
          schema:
            type: integer
        - in: query
          name: week_start
          required: true
          schema:
            type: string
            format: date
          description: Monday (or start) of the week window
        - in: query
          name: week_end
          required: true
          schema:
            type: string
            format: date
          description: End of week window (inclusive)
      responses:
        '200':
          description: Slot map keyed by ISO date (YYYY-MM-DD)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
              example:
                hairdresser_id: 1
                slots:
                  '2026-06-30':
                    - hour: '08:00'
                    - hour: '09:00'
        '422':
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationError'
        '429':
          description: Rate limited (120 requests/min per IP)
          headers:
            Retry-After:
              schema:
                type: integer
                example: 60
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RateLimitError'
components:
  securitySchemes:
    sanctum:
      type: http
      scheme: bearer
      bearerFormat: Sanctum token
  schemas:
    StoreBookingRequest:
      type: object
      required: [email, hairdresser_id, date, start_time]
      properties:
        email:
          type: string
          format: email
        name:
          type: string
        hairdresser_id:
          type: integer
        date:
          type: string
          format: date
        start_time:
          type: string
          pattern: '^([01]\d|2[0-3]):[0-5]\d$'
          example: '10:00'
    Booking:
      type: object
      properties:
        id:
          type: integer
        hairdresser_id:
          type: integer
        hairdresser_name:
          type: string
          nullable: true
        client_name:
          type: string
        email:
          type: string
          format: email
        date:
          type: string
          format: date
        start_time:
          type: string
          example: '10:00'
        scheduled_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
    AvailabilityResponse:
      type: object
      required: [hairdresser_id, slots]
      properties:
        hairdresser_id:
          type: integer
        slots:
          type: object
          additionalProperties:
            type: array
            items:
              type: object
              properties:
                hour:
                  type: string
                  example: '09:00'
    BookingConflictError:
      type: object
      properties:
        message:
          type: string
          example: This time slot is no longer available.
        error:
          type: string
          enum: [booking_conflict]
    RateLimitError:
      type: object
      properties:
        message:
          type: string
        error:
          type: string
          enum: [rate_limit_exceeded]
    MessageError:
      type: object
      properties:
        message:
          type: string
    ValidationError:
      type: object
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    PaginationLinks:
      type: object
      properties:
        first:
          type: string
          nullable: true
        last:
          type: string
          nullable: true
        prev:
          type: string
          nullable: true
        next:
          type: string
          nullable: true
    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
        last_page:
          type: integer
        per_page:
          type: integer
        total:
          type: integer
